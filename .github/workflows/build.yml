name: Build K20Pro ath9k Kernel
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    steps:
    - name: Setup
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential flex libelf-dev libssl-dev cpio python3 lld llvm clang gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi wget
    - name: Clone kernel
      run: |
        cd $HOME
        git clone --depth=1 https://github.com/SOVIET-ANDROID/kernel_xiaomi_raphael.git -b 16.0 kernel
    - name: Download firmware
      run: |
        mkdir -p $HOME/firmware/ath9k_htc/
        wget -O $HOME/firmware/ath9k_htc/htc_9271-1.4.0.fw https://github.com/endlessm/linux-firmware/raw/master/ath9k_htc/htc_9271-1.4.0.fw
        ls -la $HOME/firmware/ath9k_htc/
    - name: Configure and Build
      run: |
        cd $HOME/kernel
        export ARCH=arm64
        export SUBARCH=arm64
        make O=out ARCH=arm64 CC=clang CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- LLVM=1 LLVM_IAS=1 raphael_defconfig
        echo "CONFIG_CFG80211=y" >> out/.config
        echo "CONFIG_MAC80211=y" >> out/.config
        echo "CONFIG_MAC80211_HAS_RC=y" >> out/.config
        echo "CONFIG_MAC80211_RC_MINSTREL=y" >> out/.config
        echo "CONFIG_MAC80211_RC_DEFAULT_MINSTREL=y" >> out/.config
        echo 'CONFIG_MAC80211_RC_DEFAULT="minstrel_ht"' >> out/.config
        echo "CONFIG_WLAN_VENDOR_ATH=y" >> out/.config
        echo "CONFIG_ATH_COMMON=y" >> out/.config
        echo "CONFIG_ATH9K_HW=y" >> out/.config
        echo "CONFIG_ATH9K_COMMON=y" >> out/.config
        echo "CONFIG_ATH9K_HTC=y" >> out/.config
        echo "CONFIG_ATH9K_BTCOEX_SUPPORT=y" >> out/.config
        echo "CONFIG_FW_LOADER=y" >> out/.config
        echo 'CONFIG_EXTRA_FIRMWARE="ath9k_htc/htc_9271-1.4.0.fw"' >> out/.config
        echo 'CONFIG_EXTRA_FIRMWARE_DIR="/home/runner/firmware"' >> out/.config
        make O=out ARCH=arm64 CC=clang CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- LLVM=1 LLVM_IAS=1 olddefconfig
        echo "=== Config Check ==="
        grep -i "ATH9K\|MAC80211\|EXTRA_FIRMWARE\|CFG80211" out/.config
        echo "=== Building ==="
        make -j$(nproc) O=out ARCH=arm64 CC=clang CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- LLVM=1 LLVM_IAS=1 Image.gz-dtb
    - name: Collect
      run: |
        mkdir -p $HOME/out_files
        cp $HOME/kernel/out/arch/arm64/boot/Image.gz-dtb $HOME/out_files/ 2>/dev/null || true
        cp $HOME/kernel/out/arch/arm64/boot/Image.gz $HOME/out_files/ 2>/dev/null || true
        ls -la $HOME/out_files/
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: K20Pro-ath9k-kernel
        path: /home/runner/out_files/
