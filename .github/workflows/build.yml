name: Build K20Pro ath9k Kernel
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    steps:
    - name: Setup
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential flex libelf-dev libssl-dev cpio python3 lld llvm clang gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi
    - name: Clone kernel
      run: |
        git clone --depth=1 https://github.com/SOVIET-ANDROID/kernel_xiaomi_raphael.git -b 16.0 $GITHUB_WORKSPACE/kernel
    - name: Build
      run: |
        cd $GITHUB_WORKSPACE/kernel
        export ARCH=arm64
        export SUBARCH=arm64
        make O=out ARCH=arm64 CC=clang CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- LLVM=1 LLVM_IAS=1 raphael_defconfig
        cat out/.config | grep -i "MAC80211\|ATH9K" || true
        scripts/config --file out/.config -e CONFIG_MAC80211
        scripts/config --file out/.config -e CONFIG_MAC80211_HAS_RC
        scripts/config --file out/.config -e CONFIG_MAC80211_RC_MINSTREL
        scripts/config --file out/.config -e CONFIG_MAC80211_RC_DEFAULT_MINSTREL
        scripts/config --file out/.config -e CONFIG_MAC80211_LEDS
        scripts/config --file out/.config -e CONFIG_WLAN_VENDOR_ATH
        scripts/config --file out/.config -e CONFIG_ATH_COMMON
        scripts/config --file out/.config -m CONFIG_ATH9K_HW
        scripts/config --file out/.config -m CONFIG_ATH9K_COMMON
        scripts/config --file out/.config -m CONFIG_ATH9K_HTC
        scripts/config --file out/.config -e CONFIG_ATH9K_BTCOEX_SUPPORT
        make O=out ARCH=arm64 CC=clang CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- LLVM=1 LLVM_IAS=1 olddefconfig
        cat out/.config | grep -i "MAC80211\|ATH9K"
        echo "=== Starting build ==="
        make -j$(nproc) O=out ARCH=arm64 CC=clang CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- LLVM=1 LLVM_IAS=1 Image.gz-dtb 2>&1 | tail -100
        make -j$(nproc) O=out ARCH=arm64 CC=clang CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- LLVM=1 LLVM_IAS=1 modules 2>&1 | tail -50
    - name: Collect
      run: |
        mkdir -p $GITHUB_WORKSPACE/output/modules
        find $GITHUB_WORKSPACE/kernel/out -name "Image.gz-dtb" -exec cp {} $GITHUB_WORKSPACE/output/ \;
        find $GITHUB_WORKSPACE/kernel/out -name "Image.gz" -exec cp {} $GITHUB_WORKSPACE/output/ \;
        find $GITHUB_WORKSPACE/kernel/out -name "*.ko" -exec cp {} $GITHUB_WORKSPACE/output/modules/ \;
        echo "=== Output files ==="
        ls -la $GITHUB_WORKSPACE/output/
        ls -la $GITHUB_WORKSPACE/output/modules/ 2>/dev/null || echo "No modules found"
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: K20Pro-ath9k-kernel
        path: ${{ github.workspace }}/output/
