name: Build K20Pro ath9k Kernel
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
    - name: Setup
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential flex libelf-dev libssl-dev cpio python3
    - name: Get Clang
      run: |
        cd $HOME
        git clone --depth=1 https://github.com/kdrag0n/proton-clang.git clang
    - name: Clone kernel
      run: |
        cd $HOME
        git clone --depth=1 https://github.com/SOVIET-ANDROID/kernel_xiaomi_raphael.git -b 16.0 kernel
    - name: Configure and build
      run: |
        cd $HOME/kernel
        export ARCH=arm64
        export PATH="$HOME/clang/bin:$PATH"
        make O=out CC=clang ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- vendor/raphael_defconfig || make O=out CC=clang ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- raphael_defconfig
        echo "CONFIG_MAC80211=m" >> out/.config
        echo "CONFIG_MAC80211_HAS_RC=y" >> out/.config
        echo "CONFIG_MAC80211_RC_MINSTREL=y" >> out/.config
        echo "CONFIG_MAC80211_RC_DEFAULT_MINSTREL=y" >> out/.config
        echo "CONFIG_WLAN_VENDOR_ATH=y" >> out/.config
        echo "CONFIG_ATH_COMMON=m" >> out/.config
        echo "CONFIG_ATH9K_HW=m" >> out/.config
        echo "CONFIG_ATH9K_COMMON=m" >> out/.config
        echo "CONFIG_ATH9K_HTC=m" >> out/.config
        echo "CONFIG_ATH9K_BTCOEX_SUPPORT=y" >> out/.config
        make O=out CC=clang ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- olddefconfig
        make -j$(nproc) O=out CC=clang ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- Image.gz-dtb modules 2>&1 | tail -50
    - name: Collect files
      run: |
        mkdir -p $HOME/out_files/modules
        cp $HOME/kernel/out/arch/arm64/boot/Image.gz-dtb $HOME/out_files/ 2>/dev/null || true
        cp $HOME/kernel/out/arch/arm64/boot/Image.gz $HOME/out_files/ 2>/dev/null || true
        find $HOME/kernel/out -name "*.ko" -exec cp {} $HOME/out_files/modules/ \;
        ls -la $HOME/out_files/
        ls -la $HOME/out_files/modules/
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: K20Pro-ath9k-kernel
        path: ~/out_files/
